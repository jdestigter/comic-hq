<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Comic HQ">
<title>Comic HQ — Inventory & Listings</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bangers&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: #0a0e1a; color: #e2e8f0;
    min-height: 100vh; min-height: -webkit-fill-available;
    overflow-x: hidden;
  }
  html { height: -webkit-fill-available; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select {
    font-family: inherit; font-size: 15px;
    background: #1e293b; color: #e2e8f0;
    border: 2px solid #334155; border-radius: 10px;
    padding: 12px 14px; outline: none; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: #e94560; }

  .setup-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: linear-gradient(135deg, #0a0e1a 0%, #16213e 100%);
  }
  .setup-box {
    max-width: 440px; width: 100%; background: rgba(30,41,59,0.7);
    border: 1px solid #334155; border-radius: 20px; padding: 32px 24px;
  }
  .setup-box h1 {
    font-family: 'Bangers', cursive; font-size: 32px; letter-spacing: 2px;
    text-align: center; color: #fff; margin-bottom: 4px;
  }
  .setup-box .subtitle { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .setup-box label { display: block; font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .setup-box .hint { font-size: 12px; color: #475569; margin-top: 8px; margin-bottom: 20px; line-height: 1.5; }
  .setup-box .hint a { color: #e94560; text-decoration: none; }
  .btn-primary {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #e94560, #c23152); color: #fff;
    font-size: 16px; font-weight: 800;
  }
  .btn-primary:disabled { opacity: 0.4; }

  .app { display: none; flex-direction: column; min-height: 100vh; }
  .app.active { display: flex; }

  .topbar {
    background: linear-gradient(135deg, #0f3460 0%, #1a1a6e 50%, #533483 100%);
    padding: 14px 16px; border-bottom: 4px solid #e94560;
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar-title { font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 2px; color: #fff; }
  .topbar-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.2); color: #fff; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .tabbar {
    display: flex; background: #0f172a; border-bottom: 1px solid #1e293b;
    position: sticky; top: 60px; z-index: 49;
  }
  .tab {
    flex: 1; padding: 12px 4px; text-align: center; font-size: 12px;
    font-weight: 800; border: none; background: transparent; color: #475569;
    border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: #e94560; border-bottom-color: #e94560; background: rgba(233,69,96,0.05); }

  .content { flex: 1; padding: 16px; max-width: 800px; width: 100%; margin: 0 auto; padding-bottom: 100px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    padding: 14px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(30,41,59,0.8), rgba(15,23,42,0.8));
    border: 1px solid #334155;
  }
  .stat-card.highlight { background: linear-gradient(135deg, rgba(233,69,96,0.1), rgba(83,52,131,0.1)); border-color: rgba(233,69,96,0.3); }
  .stat-card.success { background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(16,185,129,0.02)); border-color: rgba(16,185,129,0.3); }
  .stat-label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 900; color: #f1f5f9; }
  .stat-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px; }
  .section-title { font-size: 16px; font-weight: 800; color: #f1f5f9; }

  .fab {
    position: fixed; bottom: 20px; right: 20px;
    width: 60px; height: 60px; border-radius: 30px;
    background: linear-gradient(135deg, #e94560, #c23152); color: #fff;
    border: none; font-size: 28px; font-weight: 900;
    box-shadow: 0 6px 20px rgba(233,69,96,0.5); z-index: 100;
  }

  .comic-list { display: flex; flex-direction: column; gap: 10px; }
  .comic-row {
    display: flex; gap: 12px; padding: 12px; border-radius: 12px;
    background: rgba(30,41,59,0.6); border: 1px solid #334155; cursor: pointer;
  }
  .comic-row:active { transform: scale(0.98); }
  .comic-thumb {
    width: 60px; min-width: 60px; height: 90px; border-radius: 6px;
    overflow: hidden; background: #0f172a;
  }
  .comic-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .comic-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 24px; color: #475569; }
  .comic-info { flex: 1; min-width: 0; }
  .comic-title { font-size: 14px; font-weight: 800; color: #f1f5f9; line-height: 1.3; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comic-issue { font-size: 13px; color: #a78bfa; font-weight: 700; margin-bottom: 6px; }
  .comic-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge {
    padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700;
    display: inline-block; white-space: nowrap;
  }
  .comic-value { font-size: 14px; font-weight: 900; color: #10b981; margin-top: 4px; }
  .platform-badge {
    padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: 800;
    display: inline-block; white-space: nowrap; margin-top: 2px;
  }

  .empty-state { text-align: center; padding: 48px 24px; color: #64748b; }
  .empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state .title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #94a3b8; }
  .empty-state .sub { font-size: 13px; line-height: 1.5; }

  .modal-bg {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    display: none; align-items: flex-end;
  }
  .modal-bg.active { display: flex; }
  .modal {
    width: 100%; max-height: 92vh; background: #0f172a;
    border-radius: 20px 20px 0 0; padding: 16px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    border-top: 3px solid #e94560;
  }
  .modal-handle { width: 40px; height: 4px; background: #475569; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 4px; color: #f1f5f9; }
  .modal-subtitle { font-size: 13px; color: #64748b; margin-bottom: 16px; }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(71,85,105,0.4); color: #cbd5e1;
    width: 32px; height: 32px; border-radius: 16px; border: none;
    font-size: 18px; line-height: 1;
  }

  .photo-step-indicator { display: flex; gap: 8px; margin-bottom: 14px; }
  .step-pill {
    flex: 1; padding: 8px 10px; border-radius: 8px; text-align: center;
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    border: 1px solid #334155; background: rgba(30,41,59,0.5); color: #475569;
  }
  .step-pill.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }
  .step-pill.done { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.08); }

  .upload-zone {
    border: 3px dashed #475569; border-radius: 14px; padding: 36px 20px;
    text-align: center; background: rgba(30,41,59,0.5); margin-bottom: 12px;
  }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone .label { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .upload-zone .sublabel { font-size: 12px; color: #94a3b8; }
  .btn-camera-modal {
    width: 100%; padding: 14px; border-radius: 10px;
    border: 2px solid #e94560; background: rgba(233,69,96,0.1);
    color: #e94560; font-size: 15px; font-weight: 700; margin-bottom: 16px;
  }

  .photo-tip {
    padding: 12px 14px; border-radius: 10px; margin-bottom: 14px;
    background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2);
  }
  .photo-tip .tip-label { font-size: 11px; font-weight: 800; color: #fbbf24; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .photo-tip .tip-body { font-size: 13px; color: #fde68a; line-height: 1.5; }

  .photo-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .photo-row {
    display: flex; gap: 10px; padding: 10px; border-radius: 10px;
    background: rgba(30,41,59,0.5); border: 1px solid #334155;
    align-items: center;
  }
  .photo-mini { width: 56px; height: 80px; border-radius: 6px; overflow: hidden; background: #0f172a; }
  .photo-mini img { width: 100%; height: 100%; object-fit: cover; }
  .photo-info { flex: 1; }
  .photo-info .label { font-size: 13px; font-weight: 800; color: #f1f5f9; }
  .photo-info .sub { font-size: 11px; color: #64748b; }
  .skip-btn {
    background: transparent; border: 1px solid #475569; color: #94a3b8;
    padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
  }

  .detail-cover {
    width: 100%; max-height: 320px; border-radius: 12px; overflow: hidden;
    background: #0f172a; display: flex; justify-content: center; margin-bottom: 14px;
    border: 2px solid #334155;
  }
  .detail-cover img { max-height: 320px; max-width: 100%; object-fit: contain; }

  .detail-name { font-size: 22px; font-weight: 900; color: #f1f5f9; line-height: 1.2; margin-bottom: 4px; }
  .detail-issue { font-size: 16px; color: #a78bfa; font-weight: 700; margin-bottom: 10px; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .detail-cell {
    padding: 10px 12px; border-radius: 10px;
    background: rgba(30,41,59,0.6); border: 1px solid #334155;
  }
  .detail-cell-label { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .detail-cell-value { font-size: 13px; font-weight: 700; color: #e2e8f0; }

  .recommendation { padding: 14px 16px; border-radius: 12px; margin-bottom: 14px; }
  .rec-grade { background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(245,158,11,0.04)); border: 1px solid rgba(251,191,36,0.4); }
  .rec-sell { background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(16,185,129,0.02)); border: 1px solid rgba(16,185,129,0.4); }
  .rec-bulk { background: linear-gradient(135deg, rgba(100,116,139,0.15), rgba(100,116,139,0.05)); border: 1px solid rgba(100,116,139,0.4); }
  .rec-skip { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.02)); border: 1px solid rgba(239,68,68,0.3); }
  .rec-unknown { background: rgba(30,41,59,0.6); border: 1px solid #334155; }

  .rec-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .rec-grade .rec-label { color: #fbbf24; }
  .rec-sell .rec-label { color: #10b981; }
  .rec-bulk .rec-label { color: #94a3b8; }
  .rec-skip .rec-label { color: #ef4444; }
  .rec-unknown .rec-label { color: #94a3b8; }
  .rec-action { font-size: 17px; font-weight: 900; margin-bottom: 6px; }
  .rec-grade .rec-action { color: #fde68a; }
  .rec-sell .rec-action { color: #6ee7b7; }
  .rec-bulk .rec-action { color: #cbd5e1; }
  .rec-skip .rec-action { color: #fca5a5; }
  .rec-unknown .rec-action { color: #cbd5e1; }
  .rec-reason { font-size: 13px; line-height: 1.5; opacity: 0.9; }

  .platform-rec {
    padding: 12px 14px; border-radius: 10px; margin-bottom: 14px;
    background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.25);
  }
  .platform-rec .label { font-size: 11px; font-weight: 800; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .platform-rec .platform-name { font-size: 16px; font-weight: 900; color: #93c5fd; margin-bottom: 4px; }
  .platform-rec .body { font-size: 12px; color: #bfdbfe; line-height: 1.5; }

  .info-box {
    padding: 12px 14px; border-radius: 10px; margin-bottom: 12px;
    background: rgba(30,41,59,0.6); border: 1px solid #334155;
  }
  .info-box .label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .info-box .body { font-size: 13px; color: #cbd5e1; line-height: 1.5; white-space: pre-wrap; }

  .price-box {
    padding: 14px; border-radius: 12px; margin-bottom: 12px;
    background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(16,185,129,0.02));
    border: 1px solid rgba(16,185,129,0.25);
  }
  .price-box .label { font-size: 11px; font-weight: 800; color: #10b981; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .price-box .body { font-size: 13px; color: #d1fae5; line-height: 1.7; white-space: pre-wrap; }

  .status-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .status-btn {
    padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700;
    border: 1px solid #334155; background: transparent; color: #94a3b8;
  }
  .status-btn.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }

  .action-stack { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .action-btn {
    padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700;
    border: 1px solid #334155; background: rgba(30,41,59,0.6); color: #e2e8f0;
    text-align: left; display: flex; justify-content: space-between; align-items: center;
  }
  .action-btn .arrow { color: #64748b; }
  .action-btn.danger { border-color: rgba(239,68,68,0.3); color: #fca5a5; }

  .spinner {
    width: 40px; height: 40px; margin: 24px auto;
    border: 4px solid #1e293b; border-top-color: #e94560;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { text-align: center; color: #94a3b8; font-size: 14px; }

  .listing-output {
    background: #0a0e1a; padding: 14px; border-radius: 10px;
    border: 1px solid #334155; margin-bottom: 10px;
  }
  .listing-output .field-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .listing-output .field-value { font-size: 14px; color: #e2e8f0; line-height: 1.5; word-wrap: break-word; }
  .copy-btn {
    padding: 6px 10px; border-radius: 6px; border: 1px solid #475569;
    background: transparent; color: #94a3b8; font-size: 11px; font-weight: 700;
    margin-top: 6px;
  }
  .copy-btn.copied { color: #10b981; border-color: #10b981; }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 700;
    border: 1px solid #334155; background: transparent; color: #94a3b8; white-space: nowrap;
  }
  .filter-chip.active { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }

  /* Bundle styles */
  .bundle-card {
    padding: 14px; border-radius: 12px; margin-bottom: 12px; cursor: pointer;
    background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(83,52,131,0.04));
    border: 1px solid rgba(168,85,247,0.3);
  }
  .bundle-card:active { transform: scale(0.98); }
  .bundle-type {
    font-size: 10px; font-weight: 800; color: #c4b5fd; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .bundle-title { font-size: 16px; font-weight: 900; color: #f1f5f9; margin-bottom: 6px; }
  .bundle-stats { display: flex; gap: 16px; margin-bottom: 8px; }
  .bundle-stat-mini { font-size: 12px; color: #94a3b8; }
  .bundle-stat-mini b { color: #f1f5f9; font-size: 14px; }
  .bundle-thumbs { display: flex; gap: 4px; flex-wrap: wrap; }
  .bundle-thumb { width: 30px; height: 45px; border-radius: 3px; overflow: hidden; background: #0f172a; }
  .bundle-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .bundle-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 14px; color: #475569; }

  .selectable-comic {
    display: flex; gap: 10px; padding: 10px; border-radius: 8px;
    background: rgba(30,41,59,0.4); border: 1px solid #334155;
    align-items: center; margin-bottom: 6px; cursor: pointer;
  }
  .selectable-comic.selected { border-color: #a855f7; background: rgba(168,85,247,0.08); }
  .selectable-checkbox {
    width: 22px; height: 22px; border-radius: 5px;
    border: 2px solid #475569; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900;
  }
  .selectable-comic.selected .selectable-checkbox {
    background: #a855f7; border-color: #a855f7;
  }
  .selectable-thumb { width: 36px; height: 50px; border-radius: 4px; overflow: hidden; background: #0f172a; }
  .selectable-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .selectable-info { flex: 1; min-width: 0; }
  .selectable-title { font-size: 13px; font-weight: 700; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .selectable-meta { font-size: 11px; color: #64748b; }
</style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
  <div class="setup-box">
    <h1>COMIC HQ</h1>
    <div class="subtitle">Inventory • Valuations • Bundles • Listings</div>
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <div class="hint">
      Anthropic API key (get one at <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a>). Stored only on this device.
    </div>
    <button class="btn-primary" id="saveKeyBtn" disabled>Let's Go</button>
  </div>
</div>

<div class="app" id="mainApp">
  <div class="topbar">
    <div class="topbar-title">📚 COMIC HQ</div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="exportData()" title="Export">📤</button>
      <button class="icon-btn" onclick="showSettings()" title="Settings">⚙️</button>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab active" id="tabDashboard" onclick="switchTab('dashboard')">📊 Dash</button>
    <button class="tab" id="tabInventory" onclick="switchTab('inventory')">📚 Inventory</button>
    <button class="tab" id="tabBundles" onclick="switchTab('bundles')">📦 Bundles</button>
    <button class="tab" id="tabActions" onclick="switchTab('actions')">⚡ Actions</button>
  </div>

  <div class="content" id="content"></div>

  <button class="fab" onclick="openScanModal()" title="Scan New Comic">+</button>
</div>

<div class="modal-bg" id="scanModal"><div class="modal" style="position: relative;"><button class="modal-close" onclick="closeScanModal()">×</button><div class="modal-handle"></div><div id="scanContent"></div></div></div>

<div class="modal-bg" id="detailModal"><div class="modal" style="position: relative;"><button class="modal-close" onclick="closeDetailModal()">×</button><div class="modal-handle"></div><div id="detailContent"></div></div></div>

<div class="modal-bg" id="listingModal"><div class="modal" style="position: relative;"><button class="modal-close" onclick="closeListingModal()">×</button><div class="modal-handle"></div><div id="listingContent"></div></div></div>

<div class="modal-bg" id="bundleModal"><div class="modal" style="position: relative;"><button class="modal-close" onclick="closeBundleModal()">×</button><div class="modal-handle"></div><div id="bundleContent"></div></div></div>

<script>
let apiKey = '';
let pcKey = '';
let inventory = [];
let bundles = [];
let currentTab = 'dashboard';
let currentFilter = 'all';
let detailComicId = null;
let currentBundleId = null;
let bundleBuilderState = { selectedIds: [], type: 'custom', title: '' };

let scanState = { cover: null, spine: null, step: 'cover' };

const COMIC_PROMPT = `You are a comic book expert and CGC grading specialist. Analyze the provided photo(s) of a comic book.

You will receive 1 or 2 images:
- Image 1: Front cover (always provided)

// ============ IMAGE COMPRESSION ============
function compressImage(file, opts = {}) {
  const maxDim = opts.maxDim || 1600;
  const maxBytes = opts.maxBytes || 4_500_000;
  const thumbDim = opts.thumbDim || 400;

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read image file'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const ratio = Math.min(maxDim / width, maxDim / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.85;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        const sizeFromDataUrl = (s) => Math.ceil((s.length - s.indexOf(',') - 1) * 0.75);
        while (sizeFromDataUrl(dataUrl) > maxBytes && quality > 0.3) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        let scale = 1;
        while (sizeFromDataUrl(dataUrl) > maxBytes && scale > 0.4) {
          scale -= 0.15;
          canvas.width = Math.round(width * scale); canvas.height = Math.round(height * scale);
          ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        }
        const thumbCanvas = document.createElement('canvas');
        let tw = img.width, th = img.height;
        if (tw > thumbDim || th > thumbDim) {
          const r = Math.min(thumbDim / tw, thumbDim / th);
          tw = Math.round(tw * r); th = Math.round(th * r);
        }
        thumbCanvas.width = tw; thumbCanvas.height = th;
        const tctx = thumbCanvas.getContext('2d');
        tctx.fillStyle = '#fff'; tctx.fillRect(0, 0, tw, th);
        tctx.drawImage(img, 0, 0, tw, th);
        const thumbUrl = thumbCanvas.toDataURL('image/jpeg', 0.75);

        resolve({ preview: dataUrl, base64: dataUrl.split(',')[1], mediaType: 'image/jpeg', thumbnail: thumbUrl });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  const storedPc = localStorage.getItem('comichq_pc_key');
  const inv = localStorage.getItem('comichq_inventory');

    'Settings — enter a number:\n\n' +

// ============ PLATFORM RECOMMENDATION ============
function getPlatformRec(comic) {
  const p = comic.pricing;
  if (!p || (p.raw_value_high === 0 && p.raw_value_low === 0)) {
    return { primary: 'TBD', color: '#94a3b8', reasoning: 'Run pricing first' };
  }
  const rawMid = (p.raw_value_low + p.raw_value_high) / 2;
  const grade = (comic.info.grade_label || '').toLowerCase();
  const isStrongCondition = grade.includes('near mint') || grade.includes('mint') || grade.includes('very fine');

  if (rawMid >= 200) {
    return {
      primary: 'eBay Auction',
      color: '#10b981',
      reasoning: 'High-value books need eBay\'s collector audience. Use auction format ending Sunday 7-9pm ET. Consider consignment with a known seller for $500+ books.'
    };
  }
  if (rawMid >= 50 || (comic.info.key_issue && rawMid >= 20)) {
    return {
      primary: 'eBay (Buy It Now + Best Offer)',
      color: '#10b981',
      reasoning: 'Mid-tier and key issues do best on eBay where serious collectors search. List with Best Offer enabled to capture negotiating buyers.'
    };
  }
  if (rawMid >= 10) {
    return {
      primary: 'eBay or Mercari',
      color: '#3b82f6',
      reasoning: 'Either platform works at this tier. eBay has more comic-specific buyers; Mercari has lower fees (~10% vs 13%) but less collector focus.'
    };
  }
  if (rawMid >= 5) {
    return {
      primary: 'Mercari (or bundle)',
      color: '#a855f7',
      reasoning: 'Marginal as a single. Mercari\'s casual buyers may pay; otherwise group with similar comics into a bundle for better margins.'
    };
  }
  return {
    primary: 'Bundle Only',
    color: '#64748b',
    reasoning: 'Not worth listing individually — fees and shipping eat the margin. Group into a 25-50 issue lot.'
  };
}

// ============ RECOMMENDATION LOGIC ============
function getRecommendation(comic) {
  const p = comic.pricing;
  if (!p || (p.raw_value_high === 0 && p.raw_value_low === 0)) {
    return { type: 'unknown', action: 'Pricing pending', reason: 'Run pricing analysis to get a recommendation.' };
  }

  const rawMid = (p.raw_value_low + p.raw_value_high) / 2;
  const grade98 = p.graded_value_98 || 0;
  const grade92 = p.graded_value_92 || 0;
  const gradingCost = 35;

  const grade = comic.info.grade_label || '';
  const isStrongCondition = grade.toLowerCase().includes('near mint') || grade.toLowerCase().includes('mint') || grade.toLowerCase().includes('very fine');

  if (rawMid < 5) {
    return { type: 'bulk', action: 'Bundle in a Bulk Lot',
      reason: `Raw value (~$${rawMid.toFixed(0)}) is too low to list individually. Group with similar comics into a 25-50 issue lot.` };
  }

  const expectedGradedValue = grade98 * 0.2 + grade92 * 0.5 + rawMid * 0.3;
  const gradedNetExpected = expectedGradedValue - gradingCost;
  const gradedSpread = gradedNetExpected - rawMid;

  if (isStrongCondition && grade98 > 0 && gradedSpread > rawMid && grade98 >= 100) {
    return { type: 'grade', action: 'Submit for CGC Grading',
      reason: `Strong condition + meaningful spread. Raw mid: $${rawMid.toFixed(0)}, expected graded value: ~$${expectedGradedValue.toFixed(0)}. After ~$35 grading cost, expected upside is ~$${gradedSpread.toFixed(0)}.` };
  }

  if (rawMid >= 5) {
    return { type: 'sell', action: 'Sell Raw',
      reason: `Estimated value $${p.raw_value_low}-$${p.raw_value_high}. ${comic.info.key_issue ? 'Key issue gives extra search demand. ' : ''}List at $${(p.raw_value_high * 0.95).toFixed(0)} or accept best offers above $${p.raw_value_low}.` };
  }
  return { type: 'skip', action: 'Pass', reason: 'Not worth the listing time.' };
}

function pubColor(p) {
  p = (p || '').toLowerCase();
  if (p.includes('marvel')) return '#e23636';
  if (p.includes('dc')) return '#0476F2';
  if (p.includes('image')) return '#00b4d8';
  if (p.includes('dark horse')) return '#c41e3a';
  return '#8b5cf6';
}

function statusToBadge(status) {
  const map = {
    'in_stock': { label: 'In Stock', color: '#3b82f6' },
    'listed': { label: 'Listed', color: '#a855f7' },
    'grading': { label: 'At CGC', color: '#fbbf24' },
    'sold': { label: 'Sold', color: '#10b981' },
    'bulk': { label: 'In Bulk Lot', color: '#64748b' },
    'in_bundle': { label: 'In Bundle', color: '#a855f7' }
  };
  const m = map[status] || map['in_stock'];
  return `<span class="badge" style="background:${m.color}22;color:${m.color}">${m.label}</span>`;
}

// ============ BUNDLE DETECTION ============
function detectBundles() {
  // Only consider in_stock comics for bundling, skip listed/sold/grading/in_bundle
  const available = inventory.filter(c => c.status === 'in_stock' && c.info);
  const suggestions = [];

  // 1. Run lots — same series, consecutive or near-consecutive issues
  const bySeries = {};
  available.forEach(c => {
    const key = (c.info.title || '').toLowerCase().trim();
    if (!key) return;
    if (!bySeries[key]) bySeries[key] = [];
    bySeries[key].push(c);
  });

  Object.entries(bySeries).forEach(([series, comics]) => {
    if (comics.length >= 3) {
      // Sort by issue number
      const parsed = comics.map(c => ({
        ...c,
        issueNum: parseInt((c.info.issue_number || '').replace(/\D/g, '')) || 0
      })).sort((a,b) => a.issueNum - b.issueNum);

      const lowIssue = parsed[0].issueNum;
      const highIssue = parsed[parsed.length - 1].issueNum;
      const seriesTitle = comics[0].info.title;

      suggestions.push({
        id: 'sug_run_' + series.replace(/\s/g, '_'),
        type: 'Run Lot',
        title: `${seriesTitle} #${lowIssue}-${highIssue}`,
        description: `${comics.length} consecutive issues from ${seriesTitle}`,
        comicIds: parsed.map(c => c.id),
        comicCount: comics.length
      });
    }
  });

  // 2. Story arc lots
  const byStoryArc = {};
  available.forEach(c => {
    const arc = (c.info.story_arc || '').trim();
    if (!arc || arc.toLowerCase() === 'n/a' || arc.toLowerCase() === 'none') return;
    if (!byStoryArc[arc]) byStoryArc[arc] = [];
    byStoryArc[arc].push(c);
  });

  Object.entries(byStoryArc).forEach(([arc, comics]) => {
    if (comics.length >= 2) {
      suggestions.push({
        id: 'sug_arc_' + arc.replace(/\s/g, '_'),
        type: 'Story Arc Lot',
        title: `${arc} — ${comics.length} issue lot`,
        description: `${comics.length} comics from the ${arc} crossover/storyline`,
        comicIds: comics.map(c => c.id),
        comicCount: comics.length
      });
    }
  });

  // 3. Creator lots — same writer or cover artist
  const byCreator = {};
  available.forEach(c => {
    const writer = (c.info.writer || '').trim();
    const artist = (c.info.cover_artist || '').trim();
    [writer, artist].forEach(creator => {
      if (!creator || creator.toLowerCase() === 'unknown' || creator.toLowerCase() === 'n/a') return;
      if (!byCreator[creator]) byCreator[creator] = new Set();
      byCreator[creator].add(c.id);
    });
  });

  Object.entries(byCreator).forEach(([creator, idSet]) => {
    if (idSet.size >= 4) {
      const ids = Array.from(idSet);
      const comics = inventory.filter(c => ids.includes(c.id));
      suggestions.push({
        id: 'sug_creator_' + creator.replace(/\s/g, '_'),
        type: 'Creator Lot',
        title: `${creator} comics — ${comics.length} issue lot`,
        description: `${comics.length} comics by ${creator}`,
        comicIds: ids,
        comicCount: comics.length
      });
    }
  });

  // 4. Character lots — same primary characters
  const byCharacter = {};
  available.forEach(c => {
    const chars = (c.info.notable_characters || '').split(/[,/&]/).map(s => s.trim()).filter(Boolean);
    chars.forEach(char => {
      if (!char || char.length < 3) return;
      if (!byCharacter[char]) byCharacter[char] = new Set();
      byCharacter[char].add(c.id);
    });
  });

  Object.entries(byCharacter).forEach(([char, idSet]) => {
    if (idSet.size >= 5) {
      const ids = Array.from(idSet);
      // Skip if these comics are mostly already covered by a run lot
      suggestions.push({
        id: 'sug_char_' + char.replace(/\s/g, '_'),
        type: 'Character Lot',
        title: `${char} appearances — ${idSet.size} issue lot`,
        description: `${idSet.size} comics featuring ${char}`,
        comicIds: ids,
        comicCount: idSet.size
      });
    }
  });

  // 5. Reader/grab bag — leftover low-value comics
  const lowValue = available.filter(c => {
    const p = c.pricing;
    if (!p) return false;
    return ((p.raw_value_low + p.raw_value_high) / 2) < 5;
  });
  if (lowValue.length >= 10) {
    suggestions.push({
      id: 'sug_grab_bag',
      type: 'Reader Lot',
      title: `${lowValue.length}-comic Reader Lot`,
      description: `Volume bundle of low-tier comics — sells fast at $0.50-$1/comic`,
      comicIds: lowValue.map(c => c.id),
      comicCount: lowValue.length
    });
  }

  return suggestions;
}

// ============ DASHBOARD ============
function renderDashboard() {
  const c = document.getElementById('content');

  const total = inventory.length;
  const totalValue = inventory.reduce((sum, comic) => {
    const p = comic.pricing;
    return sum + (p ? (p.raw_value_low + p.raw_value_high) / 2 : 0);
  }, 0);
  const keyIssues = inventory.filter(c => c.info?.key_issue).length;
  const sold = inventory.filter(c => c.status === 'sold').length;
  const listed = inventory.filter(c => c.status === 'listed').length;
  const soldRevenue = inventory.filter(c => c.status === 'sold').reduce((sum, c) => sum + (c.sold_price || 0), 0);

  const recommendations = inventory.filter(c => c.pricing).map(c => ({...c, rec: getRecommendation(c)}));
  const toGrade = recommendations.filter(c => c.rec.type === 'grade' && c.status === 'in_stock').slice(0, 3);
  const toSell = recommendations.filter(c => c.rec.type === 'sell' && c.status === 'in_stock').slice(0, 3);
  const bundleSuggestions = detectBundles().slice(0, 3);

  let html = `
    <div class="stats-grid">
      <div class="stat-card highlight"><div class="stat-label">📚 Total Comics</div><div class="stat-value">${total}</div><div class="stat-sub">${keyIssues} key issues</div></div>
      <div class="stat-card success"><div class="stat-label">💰 Est. Box Value</div><div class="stat-value">$${totalValue.toFixed(0)}</div><div class="stat-sub">at estimated grades</div></div>
      <div class="stat-card"><div class="stat-label">📤 Listed</div><div class="stat-value">${listed}</div><div class="stat-sub">currently for sale</div></div>
      <div class="stat-card"><div class="stat-label">✅ Sold</div><div class="stat-value">${sold}</div><div class="stat-sub">$${soldRevenue.toFixed(0)} revenue</div></div>
    </div>
  `;

  if (total === 0) {
    html += `<div class="empty-state"><div class="icon">📷</div><div class="title">Tap + to scan your first comic</div><div class="sub">Take 2 photos: cover + spine.<br>Scanner identifies, prices, and recommends what to do.</div></div>`;
  } else {
    if (toGrade.length > 0) {
      html += `<div class="section-header"><div class="section-title">🏆 Send for Grading</div></div><div class="comic-list">`;
      toGrade.forEach(comic => html += renderComicRow(comic));
      html += '</div>';
    }
    if (toSell.length > 0) {
      html += `<div class="section-header"><div class="section-title">💸 Ready to List</div></div><div class="comic-list">`;
      toSell.forEach(comic => html += renderComicRow(comic));
      html += '</div>';
    }
    if (bundleSuggestions.length > 0) {
      html += `<div class="section-header"><div class="section-title">📦 Suggested Bundles</div><button class="copy-btn" onclick="switchTab('bundles')">View all →</button></div>`;
      bundleSuggestions.forEach(b => html += renderBundleSuggestionMini(b));
    }
  }
  c.innerHTML = html;
}

function renderBundleSuggestionMini(s) {
  const comics = inventory.filter(c => s.comicIds.includes(c.id));
  const totalValue = comics.reduce((sum, c) => sum + ((c.pricing?.raw_value_low || 0) + (c.pricing?.raw_value_high || 0)) / 2, 0);
  const thumbs = comics.slice(0, 6).map(c => c.thumbnail ? `<div class="bundle-thumb"><img src="${c.thumbnail}"></div>` : `<div class="bundle-thumb placeholder">📚</div>`).join('');
  return `
    <div class="bundle-card" onclick="openBundleSuggestion('${s.id}')">
      <div class="bundle-type">${s.type}</div>
      <div class="bundle-title">${s.title}</div>
      <div class="bundle-stats">
        <div class="bundle-stat-mini"><b>${s.comicCount}</b> comics</div>
        <div class="bundle-stat-mini">~<b>$${(totalValue * 0.65).toFixed(0)}</b> bundle target</div>
      </div>
      <div class="bundle-thumbs">${thumbs}${comics.length > 6 ? `<div class="bundle-thumb placeholder">+${comics.length-6}</div>` : ''}</div>
    </div>
  `;
}

function renderComicRow(comic) {
  const value = comic.pricing && comic.pricing.raw_value_high > 0
    ? `$${((comic.pricing.raw_value_low + comic.pricing.raw_value_high) / 2).toFixed(0)} raw`
    : 'Pricing pending';
  const statusBadge = statusToBadge(comic.status);
  const thumb = comic.thumbnail || comic.image;
  const platformRec = getPlatformRec(comic);
  return `
    <div class="comic-row" onclick="openDetail('${comic.id}')">
      <div class="comic-thumb">${thumb ? `<img src="${thumb}">` : `<div class="placeholder">📚</div>`}</div>
      <div class="comic-info">
        <div class="comic-title">${comic.info?.title || 'Unknown Comic'}</div>
        <div class="comic-issue">${comic.info?.issue_number || ''}</div>
        <div class="comic-meta">
          ${statusBadge}
          ${comic.info?.key_issue ? '<span class="badge" style="background:rgba(251,191,36,0.15);color:#fbbf24">🔑 KEY</span>' : ''}
          ${comic.info?.grade_label ? `<span class="badge" style="background:rgba(100,116,139,0.2);color:#cbd5e1">${comic.info.grade_label}</span>` : ''}
        </div>
        <div class="comic-value">${value} <span class="platform-badge" style="background:${platformRec.color}22;color:${platformRec.color};margin-left:6px">${platformRec.primary}</span></div>
      </div>
    </div>
  `;
}

function renderInventory() {
  const c = document.getElementById('content');
  let filtered = inventory;
  if (currentFilter === 'in_stock') filtered = inventory.filter(c => c.status === 'in_stock');
  else if (currentFilter === 'listed') filtered = inventory.filter(c => c.status === 'listed');
  else if (currentFilter === 'grading') filtered = inventory.filter(c => c.status === 'grading');
  else if (currentFilter === 'sold') filtered = inventory.filter(c => c.status === 'sold');
  else if (currentFilter === 'key') filtered = inventory.filter(c => c.info?.key_issue);
  else if (currentFilter === 'in_bundle') filtered = inventory.filter(c => c.status === 'in_bundle');

  let html = `
    <div class="filter-bar">
      <button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All (${inventory.length})</button>
      <button class="filter-chip ${currentFilter==='in_stock'?'active':''}" onclick="setFilter('in_stock')">In Stock</button>
      <button class="filter-chip ${currentFilter==='listed'?'active':''}" onclick="setFilter('listed')">Listed</button>
      <button class="filter-chip ${currentFilter==='in_bundle'?'active':''}" onclick="setFilter('in_bundle')">In Bundle</button>
      <button class="filter-chip ${currentFilter==='grading'?'active':''}" onclick="setFilter('grading')">At CGC</button>
      <button class="filter-chip ${currentFilter==='sold'?'active':''}" onclick="setFilter('sold')">Sold</button>
      <button class="filter-chip ${currentFilter==='key'?'active':''}" onclick="setFilter('key')">🔑 Keys</button>
    </div>
  `;
  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">📭</div><div class="title">No comics here yet</div><div class="sub">Tap + to scan and add comics.</div></div>`;
  } else {
    html += '<div class="comic-list">';
    filtered.forEach(comic => html += renderComicRow(comic));
    html += '</div>';
  }
  c.innerHTML = html;
}

function setFilter(f) { currentFilter = f; renderInventory(); }

// ============ BUNDLES TAB ============
function renderBundlesTab() {
  const c = document.getElementById('content');
  const suggestions = detectBundles();
  const myBundles = bundles;

  let html = `
    <div class="section-header"><div class="section-title">📦 Your Bundles</div>
      <button class="copy-btn" onclick="openCustomBundleBuilder()">+ Custom</button>
    </div>
  `;

  if (myBundles.length === 0) {
    html += `<div class="empty-state" style="padding: 24px"><div class="sub">No bundles yet. Create one from suggestions below or build a custom bundle.</div></div>`;
  } else {
    myBundles.forEach(b => html += renderSavedBundle(b));
  }

  html += `<div class="section-header"><div class="section-title">💡 Suggested Bundles</div></div>`;
  if (suggestions.length === 0) {
    html += `<div class="empty-state" style="padding:24px"><div class="sub">No suggestions yet. Add more comics or run pricing to get bundle ideas.</div></div>`;
  } else {
    suggestions.forEach(s => html += renderBundleSuggestionMini(s));
  }

  c.innerHTML = html;
}

function renderSavedBundle(bundle) {
  const comics = inventory.filter(c => bundle.comicIds.includes(c.id));
  const totalValue = comics.reduce((sum, c) => sum + ((c.pricing?.raw_value_low || 0) + (c.pricing?.raw_value_high || 0)) / 2, 0);
  const thumbs = comics.slice(0, 6).map(c => c.thumbnail ? `<div class="bundle-thumb"><img src="${c.thumbnail}"></div>` : `<div class="bundle-thumb placeholder">📚</div>`).join('');
  const statusBadge = bundle.status === 'listed'
    ? `<span class="badge" style="background:rgba(168,85,247,0.2);color:#a855f7">Listed</span>`
    : bundle.status === 'sold'
    ? `<span class="badge" style="background:rgba(16,185,129,0.2);color:#10b981">Sold</span>`
    : `<span class="badge" style="background:rgba(59,130,246,0.2);color:#3b82f6">Draft</span>`;
  return `
    <div class="bundle-card" onclick="openSavedBundle('${bundle.id}')">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 4px">
        <div class="bundle-type">${bundle.type}</div>
        ${statusBadge}
      </div>
      <div class="bundle-title">${bundle.title}</div>
      <div class="bundle-stats">
        <div class="bundle-stat-mini"><b>${comics.length}</b> comics</div>
        <div class="bundle-stat-mini"><b>$${bundle.price || (totalValue * 0.65).toFixed(0)}</b> ${bundle.price ? 'set price' : 'suggested'}</div>
      </div>
      <div class="bundle-thumbs">${thumbs}${comics.length > 6 ? `<div class="bundle-thumb placeholder">+${comics.length-6}</div>` : ''}</div>
    </div>
  `;
}

// ============ ACTIONS ============
function renderActions() {
  const c = document.getElementById('content');
  const recs = inventory.filter(c => c.pricing && c.status === 'in_stock').map(c => ({...c, rec: getRecommendation(c)}));

  const grade = recs.filter(c => c.rec.type === 'grade');
  const sell = recs.filter(c => c.rec.type === 'sell');
  const bulk = recs.filter(c => c.rec.type === 'bulk');

  const totalGradeValue = grade.reduce((s,c) => s + ((c.pricing.graded_value_92 || 0) * 0.5 + (c.pricing.graded_value_98 || 0) * 0.2), 0);
  const totalSellValue = sell.reduce((s,c) => s + (c.pricing.raw_value_low + c.pricing.raw_value_high) / 2, 0);
  const totalBulkValue = bulk.reduce((s,c) => s + (c.pricing.raw_value_low + c.pricing.raw_value_high) / 2, 0);

  let html = `
    <div class="section-header"><div class="section-title">⚡ Recommended Actions</div></div>
    <div class="stat-card" style="margin-bottom:12px"><div class="stat-label">🏆 Send for Grading</div><div class="stat-value">${grade.length} comics</div><div class="stat-sub">~$${totalGradeValue.toFixed(0)} expected graded value (cost ~$${(grade.length * 35).toFixed(0)})</div></div>
    <div class="stat-card" style="margin-bottom:12px"><div class="stat-label">💸 List for Raw Sale</div><div class="stat-value">${sell.length} comics</div><div class="stat-sub">~$${totalSellValue.toFixed(0)} estimated revenue</div></div>
    <div class="stat-card" style="margin-bottom:12px"><div class="stat-label">📦 Bundle into Lots</div><div class="stat-value">${bulk.length} comics</div><div class="stat-sub">~$${(totalBulkValue * 0.65).toFixed(0)} target bundle revenue (~65% of single sum)</div></div>
  `;

  if (grade.length > 0) {
    html += `<div class="section-header"><div class="section-title">🏆 Grading Candidates</div></div><div class="comic-list">`;
    grade.forEach(comic => html += renderComicRow(comic));
    html += '</div>';
  }
  if (sell.length > 0) {
    html += `<div class="section-header"><div class="section-title">💸 Ready to List</div></div><div class="comic-list">`;
    sell.forEach(comic => html += renderComicRow(comic));
    html += '</div>';
  }
  if (bulk.length > 0) {
    html += `<div class="section-header"><div class="section-title">📦 Bundle Material</div><button class="copy-btn" onclick="switchTab('bundles')">Build →</button></div><div class="comic-list">`;
    bulk.forEach(comic => html += renderComicRow(comic));
    html += '</div>';
  }
  if (recs.length === 0) {
    html += `<div class="empty-state"><div class="icon">📊</div><div class="title">No recommendations yet</div><div class="sub">Scan comics and run pricing to see what to sell, grade, or bundle.</div></div>`;
  }
  c.innerHTML = html;
}

// ============ BUNDLE MODAL ============
function openBundleSuggestion(suggestionId) {
  const suggestions = detectBundles();
  const s = suggestions.find(x => x.id === suggestionId);
  if (!s) return;
  bundleBuilderState = {
    selectedIds: [...s.comicIds],
    type: s.type,
    title: s.title,
    fromSuggestion: true
  };
  document.getElementById('bundleModal').classList.add('active');
  renderBundleBuilder();
}

function openCustomBundleBuilder() {
  bundleBuilderState = { selectedIds: [], type: 'Custom', title: '', fromSuggestion: false };
  document.getElementById('bundleModal').classList.add('active');
  renderBundleBuilder();
}

function openSavedBundle(bundleId) {
  currentBundleId = bundleId;
  document.getElementById('bundleModal').classList.add('active');
  renderSavedBundleDetail();
}

function closeBundleModal() {
  document.getElementById('bundleModal').classList.remove('active');
  currentBundleId = null;
  if (currentTab === 'bundles') renderBundlesTab();
  else if (currentTab === 'dashboard') renderDashboard();
}

function renderBundleBuilder() {
  const available = inventory.filter(c => c.status === 'in_stock' || bundleBuilderState.selectedIds.includes(c.id));
  const selectedComics = inventory.filter(c => bundleBuilderState.selectedIds.includes(c.id));
  const totalValue = selectedComics.reduce((sum, c) => sum + ((c.pricing?.raw_value_low || 0) + (c.pricing?.raw_value_high || 0)) / 2, 0);
  const targetPrice = totalValue * 0.65;

  let html = `
    <div class="modal-title">📦 Build Bundle</div>
    <div class="modal-subtitle">${bundleBuilderState.type} • Pick comics to include</div>

    <input type="text" id="bundleTitleInput" placeholder="Bundle title (e.g. 'X-Men #220-240 Run Lot')" value="${bundleBuilderState.title}" style="margin-bottom: 14px">

    <div class="stats-grid" style="margin-bottom:14px">
      <div class="stat-card" style="padding:10px"><div class="stat-label" style="font-size:10px">Selected</div><div class="stat-value" style="font-size:18px">${selectedComics.length}</div></div>
      <div class="stat-card" style="padding:10px"><div class="stat-label" style="font-size:10px">Target Price</div><div class="stat-value" style="font-size:18px;color:#10b981">$${targetPrice.toFixed(0)}</div><div class="stat-sub" style="font-size:10px">~65% of $${totalValue.toFixed(0)}</div></div>
    </div>
  `;

  // Group: selected first, then others
  const selectedSet = new Set(bundleBuilderState.selectedIds);
  const sorted = [...available].sort((a, b) => {
    const aSel = selectedSet.has(a.id) ? 0 : 1;
    const bSel = selectedSet.has(b.id) ? 0 : 1;
    if (aSel !== bSel) return aSel - bSel;
    const at = (a.info?.title || '').localeCompare(b.info?.title || '');
    if (at !== 0) return at;
    return parseInt((a.info?.issue_number || '').replace(/\D/g,'')) - parseInt((b.info?.issue_number || '').replace(/\D/g,''));
  });

  html += `<div style="margin-bottom:14px">`;
  sorted.forEach(comic => {
    const isSelected = selectedSet.has(comic.id);
    const value = comic.pricing && comic.pricing.raw_value_high > 0
      ? `$${((comic.pricing.raw_value_low + comic.pricing.raw_value_high) / 2).toFixed(0)}`
      : '$?';
    const thumb = comic.thumbnail || comic.image;
    html += `
      <div class="selectable-comic ${isSelected ? 'selected' : ''}" onclick="toggleBundleComic('${comic.id}')">
        <div class="selectable-checkbox">${isSelected ? '✓' : ''}</div>
        <div class="selectable-thumb">${thumb ? `<img src="${thumb}">` : ''}</div>
        <div class="selectable-info">
          <div class="selectable-title">${comic.info?.title || 'Unknown'} ${comic.info?.issue_number || ''}</div>
          <div class="selectable-meta">${comic.info?.year || ''} • ${value} • ${comic.info?.grade_label || 'Ungraded'}</div>
        </div>
      </div>
    `;
  });
  html += `</div>`;

  html += `
    <div class="action-stack">
      <button class="btn-primary" onclick="saveBundleDraft()" ${selectedComics.length < 2 ? 'disabled' : ''}>Save Bundle (${selectedComics.length})</button>
    </div>
  `;
  document.getElementById('bundleContent').innerHTML = html;
}

function toggleBundleComic(id) {
  const titleInput = document.getElementById('bundleTitleInput');
  if (titleInput) bundleBuilderState.title = titleInput.value;
  const idx = bundleBuilderState.selectedIds.indexOf(id);
  if (idx >= 0) bundleBuilderState.selectedIds.splice(idx, 1);
  else bundleBuilderState.selectedIds.push(id);
  renderBundleBuilder();
}

function saveBundleDraft() {
  const titleInput = document.getElementById('bundleTitleInput');
  const title = (titleInput?.value || bundleBuilderState.title || 'Untitled Bundle').trim();
  if (bundleBuilderState.selectedIds.length < 2) { alert('Select at least 2 comics'); return; }

  const id = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const bundle = {
    id,
    type: bundleBuilderState.type || 'Custom',
    title,
    comicIds: [...bundleBuilderState.selectedIds],
    status: 'draft',
    created_at: new Date().toISOString(),
    listing: null,
    price: null,
    sold_price: null
  };
  bundles.unshift(bundle);

  // Update comic statuses to in_bundle
  bundleBuilderState.selectedIds.forEach(cid => {
    const c = inventory.find(x => x.id === cid);
    if (c && c.status === 'in_stock') c.status = 'in_bundle';
  });

  saveBundles();
  saveInventory();

  currentBundleId = id;
  renderSavedBundleDetail();
}

function renderSavedBundleDetail() {
  const bundle = bundles.find(b => b.id === currentBundleId);
  if (!bundle) { closeBundleModal(); return; }
  const comics = inventory.filter(c => bundle.comicIds.includes(c.id));
  const totalValue = comics.reduce((sum, c) => sum + ((c.pricing?.raw_value_low || 0) + (c.pricing?.raw_value_high || 0)) / 2, 0);
  const targetPrice = bundle.price || Math.round(totalValue * 0.65);

  let html = `
    <div class="modal-title">${bundle.title}</div>
    <div class="modal-subtitle">${bundle.type} • ${comics.length} comics</div>

    <div class="stats-grid" style="margin-bottom:14px">
      <div class="stat-card success"><div class="stat-label">💰 Target Price</div><div class="stat-value" style="font-size:22px">$${targetPrice}</div><div class="stat-sub">~65% of single sum</div></div>
      <div class="stat-card"><div class="stat-label">📈 Sum of Singles</div><div class="stat-value" style="font-size:22px">$${totalValue.toFixed(0)}</div><div class="stat-sub">if sold individually</div></div>
    </div>

    <div class="platform-rec">
      <div class="label">📍 Recommended Platform</div>
      <div class="platform-name">${comics.length >= 20 ? 'eBay (Bundle Auction)' : targetPrice >= 50 ? 'eBay Buy It Now' : 'Mercari or eBay'}</div>
      <div class="body">${comics.length >= 20 ? 'Large lots do well as 7-day auctions ending Sunday evening. Set a starting bid around 50% of target. Photograph the lot fanned out so all covers show.' : targetPrice >= 50 ? 'Use Buy It Now with Best Offer enabled. Mid-tier collectors browse eBay for run/arc lots.' : 'Mercari has lower fees for bundles in this range. Either platform works.'}</div>
    </div>

    <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px">Comics in Bundle</div>
    <div style="margin-bottom:14px">
  `;
  comics.forEach(comic => {
    const value = comic.pricing && comic.pricing.raw_value_high > 0
      ? `$${((comic.pricing.raw_value_low + comic.pricing.raw_value_high) / 2).toFixed(0)}`
      : '$?';
    const thumb = comic.thumbnail || comic.image;
    html += `
      <div class="selectable-comic">
        <div class="selectable-thumb">${thumb ? `<img src="${thumb}">` : ''}</div>
        <div class="selectable-info">
          <div class="selectable-title">${comic.info?.title || 'Unknown'} ${comic.info?.issue_number || ''}</div>
          <div class="selectable-meta">${comic.info?.year || ''} • ${value}</div>
        </div>
      </div>
    `;
  });
  html += `</div>`;

  html += `
    <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px">Status</div>
    <div class="status-row">
      <button class="status-btn ${bundle.status==='draft'?'active':''}" onclick="setBundleStatus('draft')">Draft</button>
      <button class="status-btn ${bundle.status==='listed'?'active':''}" onclick="setBundleStatus('listed')">Listed</button>
      <button class="status-btn ${bundle.status==='sold'?'active':''}" onclick="setBundleStatus('sold')">Sold</button>
    </div>
  `;

  if (bundle.status === 'sold') {
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Sold For</div>
        <input type="number" id="bundleSoldPrice" placeholder="Sold price" value="${bundle.sold_price || ''}" onchange="updateBundleSoldPrice(this.value)">
      </div>
    `;
  }

  html += `
    <div class="action-stack">
      <button class="action-btn" onclick="generateBundleListing('${bundle.id}')"><span>📝 Generate Bundle Listing</span><span class="arrow">→</span></button>
      <button class="action-btn" onclick="editBundle('${bundle.id}')"><span>✏️ Edit Bundle</span><span class="arrow">→</span></button>
      <button class="action-btn danger" onclick="deleteBundle('${bundle.id}')"><span>🗑️ Delete Bundle</span><span class="arrow">→</span></button>
    </div>
  `;

  document.getElementById('bundleContent').innerHTML = html;
}

function setBundleStatus(status) {
  const bundle = bundles.find(b => b.id === currentBundleId);
  if (!bundle) return;
  bundle.status = status;
  saveBundles();
  renderSavedBundleDetail();
}

function updateBundleSoldPrice(price) {
  const bundle = bundles.find(b => b.id === currentBundleId);
  if (!bundle) return;
  bundle.sold_price = parseFloat(price) || 0;
  saveBundles();
}

function deleteBundle(id) {
  if (!confirm('Delete this bundle? Comics will return to In Stock.')) return;
  const bundle = bundles.find(b => b.id === id);
  if (bundle) {
    bundle.comicIds.forEach(cid => {
      const c = inventory.find(x => x.id === cid);
      if (c && c.status === 'in_bundle') c.status = 'in_stock';
    });
  }
  bundles = bundles.filter(b => b.id !== id);
  saveBundles();
  saveInventory();
  closeBundleModal();
}

function editBundle(id) {
  const bundle = bundles.find(b => b.id === id);
  if (!bundle) return;
  bundleBuilderState = {
    selectedIds: [...bundle.comicIds],
    type: bundle.type,
    title: bundle.title,
    editingId: id
  };

  // Free comics from this bundle so they appear in the picker
  bundle.comicIds.forEach(cid => {
    const c = inventory.find(x => x.id === cid);
    if (c && c.status === 'in_bundle') c.status = 'in_stock';
  });
  // Remove the bundle (will be recreated on save)
  bundles = bundles.filter(b => b.id !== id);
  saveBundles();
  saveInventory();

  renderBundleBuilder();
}

async function generateBundleListing(bundleId) {
  const bundle = bundles.find(b => b.id === bundleId);
  if (!bundle) return;
  const comics = inventory.filter(c => bundle.comicIds.includes(c.id));

  document.getElementById('listingModal').classList.add('active');
  document.getElementById('listingContent').innerHTML = `
    <div class="modal-title">Generating bundle listing...</div>
    <div class="spinner"></div>
    <div class="loading-text">Writing optimized listing for ${comics.length}-comic lot</div>
  `;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: bundleListingPrompt(bundle, comics) }]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).map(i => i.text || '').join('');
    const listing = JSON.parse(text.replace(/```json|```/g, '').trim());

    bundle.listing = listing;
    bundle.price = listing.price_suggestion;
    saveBundles();

    renderBundleListingOutput(bundle, listing, comics);
  } catch (e) {
    document.getElementById('listingContent').innerHTML = `
      <div class="modal-title" style="color:#fca5a5">Failed to generate</div>
      <div class="modal-subtitle">${e.message}</div>
    `;
  }
}

function renderBundleListingOutput(bundle, listing, comics) {
  const issueList = comics.map(c => `${c.info.title} ${c.info.issue_number}`).join(', ');
  const platformRec = comics.length >= 20 ? 'eBay (Bundle Auction)' : listing.price_suggestion >= 50 ? 'eBay Buy It Now' : 'Mercari or eBay';

  document.getElementById('listingContent').innerHTML = `
    <div class="modal-title">📝 Bundle Listing Ready</div>
    <div class="modal-subtitle">${bundle.title}</div>

    <div class="platform-rec">
      <div class="label">📍 Recommended Platform</div>
      <div class="platform-name">${platformRec}</div>
    </div>

    <div class="listing-output">
      <div class="field-label">eBay Title (${listing.title.length}/80 chars)</div>
      <div class="field-value">${listing.title}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.title)}\`)">📋 Copy Title</button>
    </div>

    <div class="listing-output">
      <div class="field-label">Suggested Bundle Price</div>
      <div class="field-value" style="font-size:20px;font-weight:900;color:#10b981">$${listing.price_suggestion}</div>
    </div>

    <div class="listing-output">
      <div class="field-label">Description</div>
      <div class="field-value">${listing.description}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.description)}\`)">📋 Copy Description</button>
    </div>

    <div class="listing-output">
      <div class="field-label">Issues Included (paste in description)</div>
      <div class="field-value">${issueList}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(issueList)}\`)">📋 Copy Issue List</button>
    </div>

    <div class="listing-output">
      <div class="field-label">Keywords / Tags</div>
      <div class="field-value">${listing.keywords}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.keywords)}\`)">📋 Copy Keywords</button>
    </div>

    <div class="listing-output">
      <div class="field-label">📦 Shipping Notes</div>
      <div class="field-value">${listing.shipping_notes}</div>
    </div>

    <div class="action-stack">
      <button class="btn-primary" onclick="markBundleListed('${bundle.id}')">✓ Mark Bundle as Listed</button>
    </div>
  `;
}

function markBundleListed(id) {
  const bundle = bundles.find(b => b.id === id);
  if (!bundle) return;
  bundle.status = 'listed';
  saveBundles();
  closeListingModal();
  if (currentBundleId) renderSavedBundleDetail();
}

// ============ SCAN FLOW ============
function openScanModal() {
  scanState = { cover: null, spine: null, step: 'cover' };
  document.getElementById('scanModal').classList.add('active');
  renderScanStep();
}
function closeScanModal() { document.getElementById('scanModal').classList.remove('active'); }

function renderStepIndicator() {
  const coverDone = scanState.cover ? 'done' : (scanState.step === 'cover' ? 'active' : '');
  const spineDone = scanState.spine ? 'done' : (scanState.step === 'spine' ? 'active' : '');
  const reviewActive = scanState.step === 'review' ? 'active' : '';
  return `
    <div class="photo-step-indicator">

      <div class="modal-subtitle">${e.message}</div>

function skipSpine() { scanState.step = 'review'; renderScanStep(); }

async function runScan() {

  `;
  try {
    const content = [
      { type: 'image', source: { type: 'base64', media_type: scanState.cover.mediaType, data: scanState.cover.base64 } }

    if (scanState.spine) {
      content.push({ type: 'image', source: { type: 'base64', media_type: scanState.spine.mediaType, data: scanState.spine.base64 } });
    }
    content.push({ type: 'text', text: COMIC_PROMPT });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, messages: [{ role: 'user', content }] })

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).map(i => i.text || '').join('');
    const info = JSON.parse(text.replace(/```json|```/g, '').trim());

    document.getElementById('scanContent').innerHTML = `

    const id = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const comic = {

// ============ PRICECHARTING LOOKUP ============
// Tries PriceCharting's structured pricing API. Returns a pricing object in
// Comic HQ's existing schema, or null if PC has no usable match (caller then
// falls back to the Claude web-search pricing path).
async function tryPriceCharting(info) {
  if (!pcKey) return null;
  const query = `${info.title || ''} ${info.issue_number || ''}`.trim();
  if (!query) return null;

  try {
    const url = `https://www.pricecharting.com/api/products?t=${pcKey}&q=${encodeURIComponent(query)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.status === 'error' || !data.products || !data.products.length) return null;

    // Filter to comic books only — PC indexes Pokemon/video games in the same
    // product space, and an unfiltered "best match" can return a Pokemon card
    // for a comic query.
    const comic = data.products.find(p =>
      (p['console-name'] || '').toLowerCase().startsWith('comic books')
    );
    if (!comic) return null;

    // Map PC fields to Comic HQ schema (verified against the public price
    // guide for ASM #300 — see the project notes).
    const cents = (v) => (v == null || v === '' || v === 0) ? 0 : Math.round(v) / 100;

    const result = {
      raw_value_low:    cents(comic['cib-price']),       // ~4.0
      raw_value_high:   cents(comic['graded-price']),    // ~8.0
      graded_value_92:  cents(comic['box-only-price']),  // CGC 9.2
      graded_value_98:  cents(comic['manual-only-price']), // CGC 9.8
      market_notes: `Source: PriceCharting (${comic['product-name']}). Loose avg $${cents(comic['loose-price'])}, CGC 9.4 $${cents(comic['condition-17-price'])}.`,
      trending: 'unknown',
      _source: 'pricecharting',
      _pc_id: comic.id,
    };

    // If PC returns no usable pricing data (rare but happens on niche entries),
    // treat as a miss and fall back.
    if (!result.raw_value_high && !result.graded_value_98) return null;
    return result;
  } catch (e) {
    return null;
  }
}

async function runPricing(info) {
  // 1. Try PriceCharting first (structured, fast, free of LLM variance).
  const pc = await tryPriceCharting(info);
  if (pc) return pc;

  // 2. Fall back to existing Claude web-search pricing path.
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 3000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: pricingPrompt(info) }]
      })
    });
    const data = await resp.json();
    const textBlocks = (data.content || []).filter(i => i.type === 'text').map(i => i.text);
    const fullText = textBlocks.join('\n');
    const parsed = extractPricingJson(fullText);
    if (parsed) { parsed._source = 'web_search'; return parsed; }
    return { raw_value_low: 0, raw_value_high: 0, graded_value_92: 0, graded_value_98: 0, market_notes: fullText.slice(0, 200), trending: 'unknown', _source: 'web_search' };
  } catch (e) {
    return { raw_value_low: 0, raw_value_high: 0, graded_value_92: 0, graded_value_98: 0, market_notes: 'Pricing lookup failed', trending: 'unknown', _source: 'failed' };
  }
}

// Robust JSON extraction for pricing responses. Handles three failure modes
// that caused the "have to rerun pricing 2-3 times" bug:
//   1. Markdown code fences (```json ... ```) — stripped before parsing.
//   2. Stray { in preamble text — we walk from the END of the string and find
//      the LAST balanced {...} object, since the JSON answer is always last.
//   3. Required keys missing — we validate before returning, so partial/
//      truncated objects fall through to the empty-result path instead of
//      polluting downstream code.
function extractPricingJson(text) {
  if (!text) return null;
  // Strip markdown fences if present
  let cleaned = text.replace(/```json\s*/gi, '').replace(/```/g, '');

  // Walk backwards from end of string to find last balanced JSON object
  for (let end = cleaned.length; end > 0; end--) {
    if (cleaned[end - 1] !== '}') continue;
    let depth = 0;
    for (let start = end - 1; start >= 0; start--) {
      if (cleaned[start] === '}') depth++;
      else if (cleaned[start] === '{') {
        depth--;
        if (depth === 0) {
          const candidate = cleaned.slice(start, end);
          try {
            const obj = JSON.parse(candidate);
            // Validate it looks like a pricing object — must have at least one
            // numeric pricing field. Otherwise it's some other JSON in the
            // response and we keep walking.
            if (typeof obj.raw_value_low === 'number' || typeof obj.raw_value_high === 'number' ||
                typeof obj.graded_value_92 === 'number' || typeof obj.graded_value_98 === 'number') {
              return obj;
            }
          } catch (e) { /* not valid JSON, keep walking */ }
          break; // found balanced pair but it didn't parse/validate; try next outer }
        }
      }
    }
  }
  return null;
}

function openDetail(id) {
  detailComicId = id;

function closeDetailModal() {

      <span class="badge" style="background:rgba(100,116,139,0.2);color:#cbd5e1">${comic.info.year}</span>

        <div class="label">💰 Market Pricing</div>
        <div class="body">Raw: $${comic.pricing.raw_value_low}–$${comic.pricing.raw_value_high}${comic.pricing.graded_value_92 ? `\nCGC 9.2: $${comic.pricing.graded_value_92}` : ''}${comic.pricing.graded_value_98 ? `\nCGC 9.8: $${comic.pricing.graded_value_98}` : ''}${comic.pricing.market_notes ? '\n\n' + comic.pricing.market_notes : ''}</div>
      </div>

      <div class="detail-cell"><div class="detail-cell-label">Grade Est.</div><div class="detail-cell-value">${comic.info.estimated_grade}</div></div>

      <div class="detail-cell"><div class="detail-cell-label">Variant</div><div class="detail-cell-value">${comic.info.variant || 'Regular'}</div></div>
      <div class="detail-cell"><div class="detail-cell-label">Cover Artist</div><div class="detail-cell-value">${comic.info.cover_artist || 'Unknown'}</div></div>

function setStatus(status) {
  const comic = inventory.find(c => c.id === detailComicId);
  if (!comic) return;
  comic.status = status;
  saveInventory();
  renderDetail();
}

function updateSoldPrice(price) {
  const comic = inventory.find(c => c.id === detailComicId);
  if (!comic) return;
  comic.sold_price = parseFloat(price) || 0;
  saveInventory();
}

function deleteComic(id) {
  if (!confirm('Delete this comic from inventory?')) return;
  inventory = inventory.filter(c => c.id !== id);
  // Also remove from any bundle containing it
  bundles.forEach(b => { b.comicIds = b.comicIds.filter(cid => cid !== id); });
  bundles = bundles.filter(b => b.comicIds.length >= 2);
  saveInventory();
  saveBundles();
  closeDetailModal();
}

async function rerunPricing(id) {
  const comic = inventory.find(c => c.id === id);
  if (!comic) return;
  document.getElementById('detailContent').innerHTML = `
    <div class="modal-title">Refreshing prices...</div>
    <div class="spinner"></div>
    <div class="loading-text">Searching current market data</div>
  `;
  comic.pricing = await runPricing(comic.info);
  saveInventory();
  renderDetail();
}

async function generateListing(id) {
  const comic = inventory.find(c => c.id === id);
  if (!comic) return;
  document.getElementById('listingModal').classList.add('active');
  document.getElementById('listingContent').innerHTML = `
    <div class="modal-title">Generating listing...</div>
    <div class="spinner"></div>
    <div class="loading-text">Writing optimized title, description, and price</div>
  `;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, messages: [{ role: 'user', content: listingPrompt(comic) }] })
    });
    const data = await resp.json();
    const text = (data.content || []).map(i => i.text || '').join('');
    const listing = JSON.parse(text.replace(/```json|```/g, '').trim());
    comic.listing = listing;
    saveInventory();
    renderListing(comic, listing);
  } catch (e) {
    document.getElementById('listingContent').innerHTML = `
      <div class="modal-title" style="color:#fca5a5">Failed to generate</div>
      <div class="modal-subtitle">${e.message}</div>
    `;
  }
}

      <div class="field-value">${listing.title}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.title)}\`)">📋 Copy Title</button>
    </div>

    <div class="listing-output">
      <div class="field-label">Suggested Price</div>
      <div class="field-value" style="font-size:20px;font-weight:900;color:#10b981">$${listing.price_suggestion}</div>
    </div>

    <div class="listing-output">
      <div class="field-label">Description</div>
      <div class="field-value">${listing.description}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.description)}\`)">📋 Copy Description</button>
    </div>

    <div class="listing-output">
      <div class="field-label">Keywords / Tags</div>
      <div class="field-value">${listing.keywords}</div>
      <button class="copy-btn" onclick="copyText(this, \`${escapeForCopy(listing.keywords)}\`)">📋 Copy Keywords</button>
    </div>

    <div class="listing-output">
      <div class="field-label">📦 Shipping Notes</div>
      <div class="field-value">${listing.shipping_notes}</div>
    </div>

    <div class="action-stack">
      <button class="btn-primary" onclick="markListed('${comic.id}')">✓ Mark as Listed</button>
    </div>
  `;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 2000);
  });
}

function markListed(id) {
  const comic = inventory.find(c => c.id === id);
  if (!comic) return;
  comic.status = 'listed';
  saveInventory();
  closeListingModal();
  if (detailComicId) renderDetail();
}

function closeListingModal() { document.getElementById('listingModal').classList.remove('active'); }

function exportData() {
  if (inventory.length === 0) { alert('No inventory to export'); return; }
  const headers = ['Title','Issue','Publisher','Year','Era','Grade','Key Issue','Status','Raw Low','Raw High','CGC 9.2','CGC 9.8','Sold Price','Added'];
  const rows = inventory.map(c => [
    c.info?.title || '', c.info?.issue_number || '', c.info?.publisher || '',
    c.info?.year || '', c.info?.era || '', c.info?.estimated_grade || '',
    c.info?.key_issue ? 'Yes' : 'No', c.status,
    c.pricing?.raw_value_low || '', c.pricing?.raw_value_high || '',
    c.pricing?.graded_value_92 || '', c.pricing?.graded_value_98 || '',
    c.sold_price || '', c.added_at?.split('T')[0] || ''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'comic_inventory_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

init();
</script>
</body>
</html>
